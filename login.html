<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEKIE — Sign In</title>
  <meta name="description" content="Sign in or create your XEKIE account. Post what you want to buy and let sellers come to you.">
  <link rel="apple-touch-icon" href="/icon-180x180.png">
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DPXVZVMJXX"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-DPXVZVMJXX');</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--black:#0a0a0a;--white:#fafaf8;--cream:#f4f2ec;--accent:#ff4d1c;--mid:#6b6b6b;--border:rgba(10,10,10,0.12);--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
    body{font-family:var(--font-body);background:var(--cream);color:var(--black);min-height:100vh;display:flex;flex-direction:column;}
    nav{padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
    .nav-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-0.03em;color:var(--black);text-decoration:none;display:flex;flex-direction:column;line-height:1;}
    .nav-logo .xe{color:var(--accent);}
    .nav-tagline{font-size:8px;font-weight:400;letter-spacing:0.15em;color:var(--mid);text-transform:uppercase;}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .auth-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:100%;max-width:420px;}
    .auth-tagline{font-size:11px;letter-spacing:0.2em;color:var(--mid);text-transform:uppercase;margin-bottom:8px;}
    .auth-title{font-family:var(--font-display);font-weight:800;font-size:32px;letter-spacing:-0.03em;color:var(--black);margin-bottom:4px;}
    .auth-title .xe{color:var(--accent);}
    .auth-sub{font-size:15px;font-weight:300;color:var(--mid);margin-bottom:32px;line-height:1.5;}
    .tabs{display:flex;gap:0;margin-bottom:28px;background:var(--cream);border-radius:10px;padding:4px;}
    .tab{flex:1;padding:9px;text-align:center;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;transition:all 0.2s;border:none;background:transparent;color:var(--mid);}
    .tab.active{background:var(--white);color:var(--black);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
    .tab-panel{display:none;}.tab-panel.active{display:block;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--black);}
    input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font-body);font-size:15px;background:var(--cream);color:var(--black);outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--black);}
    .btn-submit{width:100%;padding:13px;background:var(--black);color:var(--white);border:none;border-radius:10px;font-family:var(--font-body);font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;transition:background 0.2s;}
    .btn-submit:hover{background:var(--accent);}
    .btn-submit:disabled{background:#ccc;cursor:not-allowed;}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--mid);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .btn-google{width:100%;padding:11px;background:var(--white);color:var(--black);border:1.5px solid var(--border);border-radius:10px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color 0.2s;}
    .btn-google:hover{border-color:var(--black);}
    .forgot{font-size:13px;color:var(--mid);text-align:right;cursor:pointer;margin-top:8px;}
    .forgot:hover{color:var(--accent);}
    .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none;}
    .msg.error{background:#fee;color:#c00;display:block;}
    .msg.success{background:#efe;color:#080;display:block;}
    .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--black);color:var(--white);padding:14px 24px;border-radius:12px;font-size:14px;z-index:1000;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast-sub{font-size:12px;color:#aaa;margin-top:2px;}
    footer{background:var(--black);color:var(--white);padding:24px 40px;margin-top:auto;}
    .footer-inner{max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .footer-links{display:flex;gap:20px;flex-wrap:wrap;}
    .footer-links a{font-size:13px;color:#666;text-decoration:none;}
    .footer-copy{font-size:12px;color:#444;}
    @media(max-width:480px){.auth-card{padding:32px 24px;}nav{padding:0 20px;}}
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div>Welcome to XEKIE! 🔶</div>
    <div class="toast-sub">Check your inbox — a welcome email is on its way.</div>
  </div>

  <nav>
    <a href="index.html" class="nav-logo">
      <span><span class="xe">XE</span>KIE</span>
      <span class="nav-tagline">Trade Different</span>
    </a>
  </nav>

  <main>
    <div class="auth-card">
      <div class="auth-tagline">Trade Different</div>
      <h1 class="auth-title">Welcome to <span class="xe">XEKIE</span></h1>
      <p class="auth-sub">Sign in or create an account to post and browse XEKIEs.</p>

      <div class="tabs">
        <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      </div>

      <div class="tab-panel active" id="panel-signin">
        <div class="form-group"><label>Email</label><input type="email" id="signin-email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="signin-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signIn()" /></div>
        <button class="btn-submit" id="btn-signin" onclick="signIn()">Sign in</button>
        <div class="forgot" onclick="forgotPassword()">Forgot password?</div>
        <div class="divider">or</div>
        <button class="btn-google" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
        <div class="msg" id="signin-msg"></div>
      </div>

      <div class="tab-panel" id="panel-signup">
        <div class="form-group"><label>Your name</label><input type="text" id="signup-name" placeholder="First name or username" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="signup-password" placeholder="At least 6 characters" onkeydown="if(event.key==='Enter')signUp()" /></div>
        <button class="btn-submit" id="btn-signup" onclick="signUp()">Create account</button>
        <div class="divider">or</div>
        <button class="btn-google" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
        <div class="msg" id="signup-msg"></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-links">
        <a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="index.html">Home</a>
      </div>
      <div class="footer-copy">© 2025 XEKIE LLC</div>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://jlcrarqiyejgjbdesxik.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA";
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    _sb.auth.getSession().then(({ data: { session } }) => { if (session) window.location.href = 'dashboard.html'; });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-'+tab).classList.add('active');
      document.getElementById('panel-'+tab).classList.add('active');
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 4500);
    }

    function showMessage(id, msg, type) {
      const el = document.getElementById(id);
      el.className = 'msg ' + type;
      el.textContent = msg;
    }

    async function sendWelcomeEmail(email, name) {
      try {
        await fetch('/.netlify/functions/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'welcome', to: email, data: { name } })
        });
      } catch(e) { /* silent */ }
    }

    async function signIn() {
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const btn = document.getElementById('btn-signin');
      if (!email || !password) return showMessage('signin-msg', 'Please fill in all fields.', 'error');
      btn.disabled = true; btn.textContent = 'Signing in...';
      const { error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) { showMessage('signin-msg', error.message, 'error'); btn.disabled = false; btn.textContent = 'Sign in'; }
      else window.location.href = 'dashboard.html';
    }

    async function signUp() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const btn = document.getElementById('btn-signup');
      if (!name || !email || !password) return showMessage('signup-msg', 'Please fill in all fields.', 'error');
      if (password.length < 6) return showMessage('signup-msg', 'Password must be at least 6 characters.', 'error');
      btn.disabled = true; btn.textContent = 'Creating account...';
      const { data, error } = await _sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
      if (error) {
        showMessage('signup-msg', error.message, 'error');
        btn.disabled = false; btn.textContent = 'Create account';
      } else {
        sendWelcomeEmail(email, name);
        showToast();
        btn.textContent = 'Account created ✓';
        if (data.session) setTimeout(() => window.location.href = 'dashboard.html', 1800);
      }
    }

    async function signInWithGoogle() {
      const { error } = await _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
      if (error) showMessage('signin-msg', error.message, 'error');
    }

    async function forgotPassword() {
      const email = document.getElementById('signin-email').value.trim();
      if (!email) return showMessage('signin-msg', 'Enter your email above first.', 'error');
      const { error } = await _sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/login.html' });
      if (error) showMessage('signin-msg', error.message, 'error');
      else showMessage('signin-msg', 'Password reset email sent!', 'success');
    }
  </script>
</body>
</html>

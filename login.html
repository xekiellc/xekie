<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEKIE — Sign In</title>

  <meta name="theme-color" content="#ff4d1c">
  <link rel="apple-touch-icon" href="/icon-180x180.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Google Analytics -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --white: #fafaf8; --cream: #f4f2ec; --accent: #ff4d1c; --mid: #6b6b6b; --border: rgba(10,10,10,0.12); --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
    body { font-family: var(--font-body); background: var(--cream); color: var(--black); min-height: 100vh; display: flex; flex-direction: column; }
    nav { padding: 0 40px; height: 64px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 20px; letter-spacing: -0.03em; color: var(--black); text-decoration: none; display: flex; flex-direction: column; line-height: 1; }
    .nav-logo .xe { color: var(--accent); }
    .nav-tagline { font-size: 8px; font-weight: 400; letter-spacing: 0.15em; color: var(--mid); font-family: var(--font-body); text-transform: uppercase; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 420px; }
    .auth-tagline { font-size: 11px; letter-spacing: 0.2em; color: var(--mid); text-transform: uppercase; margin-bottom: 8px; }
    .auth-title { font-family: var(--font-display); font-weight: 800; font-size: 32px; letter-spacing: -0.03em; color: var(--black); margin-bottom: 4px; }
    .auth-title .xe { color: var(--accent); }
    .auth-sub { font-size: 15px; font-weight: 300; color: var(--mid); margin-bottom: 32px; line-height: 1.5; }
    .tabs { display: flex; background: var(--cream); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 9px; border: none; background: transparent; border-radius: 7px; font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--mid); cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--white); color: var(--black); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--black); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-body); font-size: 15px; color: var(--black); background: var(--white); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--black); }
    input::placeholder { color: #bbb; }
    .btn-submit { width: 100%; padding: 14px; background: var(--black); color: var(--white); border: none; border-radius: 10px; font-family: var(--font-body); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.15s; }
    .btn-submit:hover { background: var(--accent); transform: translateY(-1px); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--mid); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; padding: 13px; background: var(--white); color: var(--black); border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-body); font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s, transform 0.15s; }
    .btn-google:hover { border-color: var(--black); transform: translateY(-1px); }
    .message { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
    .message.error { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; display: block; }
    .message.success { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; display: block; }
    .forgot-link { display: block; text-align: right; font-size: 13px; color: var(--mid); text-decoration: none; margin-top: -8px; margin-bottom: 16px; }
    .forgot-link:hover { color: var(--black); }
    #toast-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.88); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    #toast-overlay.show { display: flex; }
    .toast-emoji { font-size: 88px; animation: clink 0.5s cubic-bezier(.36,.07,.19,.97); }
    .toast-text { font-family: var(--font-display); font-size: 30px; font-weight: 800; color: var(--white); text-align: center; letter-spacing: -0.02em; }
    .toast-sub { font-size: 15px; color: #888; text-align: center; font-weight: 300; }
    @keyframes clink { 0%{transform:rotate(-25deg) scale(0.4);opacity:0} 60%{transform:rotate(12deg) scale(1.15)} 100%{transform:rotate(0deg) scale(1);opacity:1} }
    footer { background: var(--black); color: var(--white); padding: 32px 40px; margin-top: auto; }
    .footer-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .footer-links { display: flex; gap: 20px; flex-wrap: wrap; }
    .footer-links a { font-size: 13px; color: #666; text-decoration: none; }
    .footer-links a:hover { color: var(--white); }
    .footer-copy { font-size: 12px; color: #444; }
    @media (max-width: 480px) { .auth-card { padding: 32px 24px; } nav { padding: 0 20px; } }
  </style>
</head>
<body>
  <div id="toast-overlay">
    <div class="toast-emoji">🥂</div>
    <div class="toast-text">Welcome to XEKIE!</div>
    <div class="toast-sub">You're in. Let's trade different.</div>
  </div>
  <nav>
    <a href="index.html" class="nav-logo">
      <span><span class="xe">XE</span>KIE</span>
      <span class="nav-tagline">Trade Different</span>
    </a>
  </nav>
  <main>
    <div class="auth-card">
      <div class="auth-tagline">Trade Different</div>
      <h1 class="auth-title">Welcome to <span class="xe">XEKIE</span></h1>
      <p class="auth-sub">Sign in or create an account to post and browse XEKIEs.</p>
      <div class="tabs">
        <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      </div>
      <div id="message" class="message"></div>
      <div id="form-signin">
        <div class="form-group"><label>Email</label><input type="email" id="signin-email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="signin-password" placeholder="••••••••" /></div>
        <a href="#" class="forgot-link" onclick="forgotPassword(); return false;">Forgot password?</a>
        <button class="btn-submit" id="btn-signin" onclick="signIn()">Sign in</button>
        <div class="divider">or</div>
        <button class="btn-google" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>
      <div id="form-signup" style="display:none;">
        <div class="form-group"><label>Full name</label><input type="text" id="signup-name" placeholder="Jane Smith" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="signup-password" placeholder="At least 6 characters" /></div>
        <button class="btn-submit" id="btn-signup" onclick="signUp()">Create account</button>
        <div class="divider">or</div>
        <button class="btn-google" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-inner">
      <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="prohibited-items.html">Prohibited Items</a>
        <a href="terms.html">Terms of Service</a>
        <a href="guidelines.html">Guidelines</a>
      </div>
      <div class="footer-copy">© 2025 XEKIE LLC</div>
    </div>
  </footer>
  <script>
    const SUPABASE_URL = "https://jlcrarqiyejgjbdesxik.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA";
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    _sb.auth.getSession().then(({ data: { session } }) => { if (session) window.location.href = 'dashboard.html'; });
    function switchTab(tab) {
      document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      clearMessage();
    }
    function showMessage(text, type) { const el = document.getElementById('message'); el.textContent = text; el.className = 'message ' + type; }
    function clearMessage() { const el = document.getElementById('message'); el.className = 'message'; el.textContent = ''; }
    function showToast() {
      document.getElementById('toast-overlay').classList.add('show');
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        [783.99, 987.77].forEach((freq, i) => {
          const o = actx.createOscillator(), g = actx.createGain();
          o.connect(g); g.connect(actx.destination);
          o.frequency.value = freq; o.type = 'sine';
          g.gain.setValueAtTime(0, actx.currentTime + i * 0.1);
          g.gain.linearRampToValueAtTime(0.3, actx.currentTime + i * 0.1 + 0.01);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + i * 0.1 + 1.5);
          o.start(actx.currentTime + i * 0.1);
          o.stop(actx.currentTime + i * 0.1 + 1.5);
        });
      } catch(e) {}
      setTimeout(() => { document.getElementById('toast-overlay').classList.remove('show'); window.location.href = 'dashboard.html'; }, 3000);
    }
    async function signIn() {
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const btn = document.getElementById('btn-signin');
      if (!email || !password) return showMessage('Please fill in all fields.', 'error');
      btn.disabled = true; btn.textContent = 'Signing in...';
      const { error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) { showMessage(error.message, 'error'); btn.disabled = false; btn.textContent = 'Sign in'; }
      else window.location.href = 'dashboard.html';
    }
    async function signUp() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const btn = document.getElementById('btn-signup');
      if (!name || !email || !password) return showMessage('Please fill in all fields.', 'error');
      if (password.length < 6) return showMessage('Password must be at least 6 characters.', 'error');
      btn.disabled = true; btn.textContent = 'Creating account...';
      const { error } = await _sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
      if (error) { showMessage(error.message, 'error'); btn.disabled = false; btn.textContent = 'Create account'; }
      else showToast();
    }
    async function signInWithGoogle() {
      const { error } = await _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
      if (error) showMessage(error.message, 'error');
    }
    async function forgotPassword() {
      const email = document.getElementById('signin-email').value.trim();
      if (!email) return showMessage('Enter your email above first.', 'error');
      const { error } = await _sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/login.html' });
      if (error) showMessage(error.message, 'error');
      else showMessage('Password reset email sent!', 'success');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const onSignin = document.getElementById('form-signin').style.display !== 'none';
        onSignin ? signIn() : signUp();
      }
    });
  </script>
</body>
</html>

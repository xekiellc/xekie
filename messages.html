<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEKIE — Messages</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff4d1c">
  <link rel="apple-touch-icon" href="/icon-180x180.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DPXVZVMJXX"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-DPXVZVMJXX');</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--black:#0a0a0a;--white:#fafaf8;--cream:#f4f2ec;--accent:#ff4d1c;--mid:#6b6b6b;--border:rgba(10,10,10,0.12);--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
    body{font-family:var(--font-body);background:var(--cream);color:var(--black);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    nav{padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--cream);flex-shrink:0;}
    .nav-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-0.03em;color:var(--black);text-decoration:none;display:flex;flex-direction:column;line-height:1;}
    .nav-logo .xe{color:var(--accent);}
    .nav-tagline{font-size:8px;font-weight:400;letter-spacing:0.15em;color:var(--mid);font-family:var(--font-body);text-transform:uppercase;}
    .nav-right{display:flex;align-items:center;gap:12px;}
    .btn-nav{font-size:13px;font-weight:500;padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;position:relative;}
    .btn-nav:hover{border-color:var(--black);color:var(--black);}
    .btn-nav.primary{background:var(--black);color:var(--white);border-color:transparent;}
    .btn-nav.primary:hover{background:var(--accent);}
    .msg-badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:white;border-radius:100px;font-size:10px;font-weight:700;padding:2px 5px;min-width:16px;text-align:center;line-height:14px;display:none;}
    .msg-badge.show{display:block;}
    .chat-layout{display:flex;flex:1;overflow:hidden;}
    .sidebar{width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--white);flex-shrink:0;}
    .sidebar-header{padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .sidebar-title{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:-0.02em;}
    .sidebar-sub{font-size:13px;color:var(--mid);margin-top:2px;}
    .convo-list{flex:1;overflow-y:auto;}
    .convo-item{padding:16px 24px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;display:flex;flex-direction:column;gap:4px;position:relative;}
    .convo-item:hover{background:var(--cream);}
    .convo-item.active{background:var(--cream);border-left:3px solid var(--accent);}
    .convo-item.unread{background:#fff9f8;}
    .convo-item.unread .convo-preview{font-weight:500;color:var(--black);}
    .convo-xekie{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:20px;}
    .convo-preview{font-size:13px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .convo-time{font-size:11px;color:#bbb;}
    .convo-meta{display:flex;align-items:center;justify-content:space-between;}
    .unread-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;}
    .unread-count{font-size:10px;font-weight:700;background:var(--accent);color:white;border-radius:100px;padding:1px 6px;min-width:18px;text-align:center;}
    .empty-convos{padding:48px 24px;text-align:center;color:var(--mid);font-size:14px;line-height:1.8;}
    .chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .chat-header{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
    .chat-xekie-title{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-0.02em;}
    .chat-with{font-size:13px;color:var(--mid);margin-top:2px;}
    .btn-view-xekie{font-size:12px;font-weight:500;padding:6px 14px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;text-decoration:none;transition:all 0.2s;}
    .btn-view-xekie:hover{border-color:var(--black);color:var(--black);}
    .chat-messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:12px;}
    .msg{display:flex;flex-direction:column;max-width:72%;}
    .msg.mine{align-self:flex-end;align-items:flex-end;}
    .msg.theirs{align-self:flex-start;align-items:flex-start;}
    .msg-bubble{padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.5;}
    .msg.mine .msg-bubble{background:var(--black);color:var(--white);border-bottom-right-radius:4px;}
    .msg.theirs .msg-bubble{background:var(--white);color:var(--black);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg-time{font-size:11px;color:#bbb;margin-top:4px;padding:0 4px;}
    .chat-input-area{padding:16px 28px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0;}
    .chat-input-row{display:flex;gap:10px;align-items:flex-end;}
    .chat-input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:24px;font-family:var(--font-body);font-size:15px;color:var(--black);background:var(--cream);outline:none;resize:none;max-height:120px;line-height:1.5;transition:border-color 0.2s;}
    .chat-input:focus{border-color:var(--black);background:var(--white);}
    .btn-send{width:44px;height:44px;border-radius:50%;background:var(--black);color:var(--white);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background 0.2s;flex-shrink:0;}
    .btn-send:hover{background:var(--accent);}
    .btn-send:disabled{background:#ccc;cursor:not-allowed;}
    .chat-empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;}
    .chat-empty-icon{font-size:48px;margin-bottom:16px;}
    .chat-empty-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:8px;}
    .chat-empty-sub{font-size:15px;color:var(--mid);font-weight:300;line-height:1.6;}
    .date-divider{text-align:center;font-size:11px;color:#bbb;letter-spacing:0.1em;text-transform:uppercase;margin:8px 0;}
    .loading-msgs{text-align:center;padding:40px;color:var(--mid);}
    .typing-indicator{display:none;align-self:flex-start;padding:8px 16px;background:var(--white);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;}
    .typing-indicator.show{display:flex;gap:4px;align-items:center;}
    .typing-dot{width:6px;height:6px;background:#ccc;border-radius:50%;animation:typingBounce 1.2s infinite;}
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    @media(max-width:700px){
      .sidebar{width:100%;position:relative;}
      .chat-panel{display:none;position:fixed;inset:64px 0 0 0;z-index:20;background:var(--cream);}
      .chat-panel.mobile-active{display:flex;}
      nav{padding:0 20px;}
      .back-btn{display:flex;}
    }
    .back-btn{display:none;align-items:center;gap:6px;font-size:13px;color:var(--mid);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font-body);}
    .back-btn:hover{color:var(--black);}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <span><span class="xe">XE</span>KIE</span>
      <span class="nav-tagline">Trade Different</span>
    </a>
    <div class="nav-right">
      <a href="dashboard.html" class="btn-nav">My XEKIEs</a>
      <a href="radar.html" class="btn-nav">Browse</a>
      <a href="request.html" class="btn-nav primary">XEKIE it →</a>
    </div>
  </nav>

  <div class="chat-layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">💬 Messages</div>
        <div class="sidebar-sub" id="sidebar-sub">Loading...</div>
      </div>
      <div class="convo-list" id="convo-list">
        <div class="empty-convos">Loading...</div>
      </div>
    </div>

    <div class="chat-panel" id="chat-panel">
      <div class="chat-empty" id="chat-empty">
        <div>
          <div class="chat-empty-icon">💬</div>
          <div class="chat-empty-title">Your messages</div>
          <div class="chat-empty-sub">Select a conversation to start chatting.<br>Respond to a XEKIE to begin a new one.</div>
        </div>
      </div>
      <div id="chat-active" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="chat-header">
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="back-btn" onclick="closeMobileChat()">← Back</button>
            <div>
              <div class="chat-xekie-title" id="chat-xekie-title">—</div>
              <div class="chat-with" id="chat-with">—</div>
            </div>
          </div>
          <a href="#" class="btn-view-xekie" id="btn-view-xekie" target="_blank">View XEKIE →</a>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
        <div class="chat-input-area">
          <div class="chat-input-row">
            <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1" onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
            <button class="btn-send" id="btn-send" onclick="sendMessage()">↑</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://jlcrarqiyejgjbdesxik.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA";
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null, activeConvo = null, realtimeChannel = null, allConvos = [];
    let xekieOwnerCache = {}; // cache xekie owner lookups

    function timeAgo(ts) {
      const s = Math.floor((new Date() - new Date(ts)) / 1000);
      for (const [l, sec] of [["year",31536000],["month",2592000],["day",86400],["hour",3600],["minute",60]]) {
        const c = Math.floor(s/sec); if (c>=1) return c+" "+l+(c>1?"s":"")+" ago";
      }
      return "just now";
    }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }
    function formatDate(ts) {
      const d = new Date(ts), today = new Date(), yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      if (d.toDateString() === today.toDateString()) return 'Today';
      if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
    function handleInputKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\n/g,'<br>');
    }
    function closeMobileChat() {
      document.getElementById('chat-panel').classList.remove('mobile-active');
    }

    async function loadConversations() {
      const { data: msgs } = await _sb.from('messages')
        .select('*')
        .or(`sender_id.eq.${currentUser.id},recipient_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: false });

      if (!msgs || !msgs.length) {
        document.getElementById('convo-list').innerHTML = '<div class="empty-convos">No messages yet.<br><br>Respond to a XEKIE to start a conversation!</div>';
        document.getElementById('sidebar-sub').textContent = '0 conversations';
        return;
      }

      const convoMap = {};
      msgs.forEach(m => {
        const otherId = m.sender_id === currentUser.id ? m.recipient_id : m.sender_id;
        const key = `${m.xekie_id}__${otherId}`;
        if (!convoMap[key]) convoMap[key] = { xekieId: m.xekie_id, otherId, lastMsg: m, unread: 0 };
        if (!m.is_read && m.recipient_id === currentUser.id) convoMap[key].unread++;
      });

      const xekieIds = [...new Set(Object.values(convoMap).map(c => c.xekieId))];
      const { data: xekies } = await _sb.from('xekies').select('id,title,user_id').in('id', xekieIds);
      const xekieMap = {}, xekieOwnerMap = {};
      (xekies || []).forEach(x => { xekieMap[x.id] = x.title; xekieOwnerMap[x.id] = x.user_id; });

      allConvos = Object.values(convoMap).sort((a,b) => new Date(b.lastMsg.created_at) - new Date(a.lastMsg.created_at));
      allConvos.forEach(c => {
        c.xekieTitle = xekieMap[c.xekieId] || 'XEKIE';
        c.xekieOwnerId = xekieOwnerMap[c.xekieId];
      });

      const totalUnread = allConvos.reduce((sum, c) => sum + c.unread, 0);
      document.getElementById('sidebar-sub').textContent = allConvos.length + ' conversation' + (allConvos.length !== 1 ? 's' : '') + (totalUnread > 0 ? ` · ${totalUnread} unread` : '');
      document.title = totalUnread > 0 ? `(${totalUnread}) XEKIE — Messages` : 'XEKIE — Messages';

      document.getElementById('convo-list').innerHTML = allConvos.map((c, i) => {
        const isMine = c.lastMsg.sender_id === currentUser.id;
        const preview = (isMine ? 'You: ' : '') + c.lastMsg.content;
        return `<div class="convo-item ${c.unread > 0 ? 'unread' : ''}" onclick="openConvo(${i})" id="convo-${i}">
          <div class="convo-xekie">${c.xekieTitle}</div>
          <div class="convo-preview">${escapeHtml(preview.slice(0,60))}${preview.length > 60 ? '...' : ''}</div>
          <div class="convo-meta">
            <span class="convo-time">${timeAgo(c.lastMsg.created_at)}</span>
            ${c.unread > 0 ? `<span class="unread-count">${c.unread}</span>` : ''}
          </div>
        </div>`;
      }).join('');

      const params = new URLSearchParams(window.location.search);
      const urlXekieId = params.get('xekie'), urlOtherId = params.get('other');
      if (urlXekieId && urlOtherId) {
        const idx = allConvos.findIndex(c => c.xekieId === urlXekieId && c.otherId === urlOtherId);
        if (idx >= 0) openConvo(idx);
        else openFreshConvo(urlXekieId, urlOtherId);
      }
    }

    async function openConvo(idx) {
      activeConvo = allConvos[idx];
      document.querySelectorAll('.convo-item').forEach((el, i) => el.classList.toggle('active', i === idx));
      document.getElementById('chat-empty').style.display = 'none';
      const chatActive = document.getElementById('chat-active');
      chatActive.style.display = 'flex';
      document.getElementById('chat-xekie-title').textContent = activeConvo.xekieTitle;
      document.getElementById('chat-with').textContent = activeConvo.xekieOwnerId === currentUser.id ? 'You are the buyer' : 'Chatting with buyer';
      document.getElementById('btn-view-xekie').href = `xekie.html?id=${activeConvo.xekieId}`;
      document.getElementById('chat-messages').innerHTML = '<div class="loading-msgs">Loading...</div>';
      document.getElementById('chat-panel').classList.add('mobile-active');

      await loadMessages();
      subscribeToMessages();

      // Mark sidebar item as read
      const convoEl = document.getElementById(`convo-${idx}`);
      if (convoEl) {
        convoEl.classList.remove('unread');
        const badge = convoEl.querySelector('.unread-count');
        if (badge) badge.remove();
      }
    }

    async function openFreshConvo(xekieId, otherId) {
      const { data: xekie } = await _sb.from('xekies').select('title,user_id').eq('id', xekieId).single();
      activeConvo = { xekieId, otherId, xekieTitle: xekie?.title || 'XEKIE', xekieOwnerId: xekie?.user_id, unread: 0, lastMsg: null };
      document.getElementById('chat-empty').style.display = 'none';
      const chatActive = document.getElementById('chat-active');
      chatActive.style.display = 'flex';
      document.getElementById('chat-xekie-title').textContent = activeConvo.xekieTitle;
      document.getElementById('chat-with').textContent = 'New conversation';
      document.getElementById('btn-view-xekie').href = `xekie.html?id=${xekieId}`;
      document.getElementById('chat-messages').innerHTML = '<div class="loading-msgs" style="color:#bbb;font-size:14px;">No messages yet — send one!</div>';
      document.getElementById('chat-panel').classList.add('mobile-active');
      subscribeToMessages();
    }

    async function loadMessages() {
      const { data: msgs } = await _sb.from('messages')
        .select('*')
        .eq('xekie_id', activeConvo.xekieId)
        .or(`and(sender_id.eq.${currentUser.id},recipient_id.eq.${activeConvo.otherId}),and(sender_id.eq.${activeConvo.otherId},recipient_id.eq.${currentUser.id})`)
        .order('created_at', { ascending: true });
      renderMessages(msgs || []);
      const unreadIds = (msgs || []).filter(m => m.recipient_id === currentUser.id && !m.is_read).map(m => m.id);
      if (unreadIds.length) await _sb.from('messages').update({ is_read: true }).in('id', unreadIds);
    }

    function renderMessages(msgs) {
      const container = document.getElementById('chat-messages');
      if (!msgs.length) {
        container.innerHTML = '<div class="loading-msgs" style="color:#bbb;font-size:14px;">No messages yet — say hello!</div>';
        return;
      }
      let html = '', lastDate = '';
      msgs.forEach(m => {
        const dateStr = formatDate(m.created_at);
        if (dateStr !== lastDate) { html += `<div class="date-divider">${dateStr}</div>`; lastDate = dateStr; }
        const isMine = m.sender_id === currentUser.id;
        html += `<div class="msg ${isMine ? 'mine' : 'theirs'}">
          <div class="msg-bubble">${escapeHtml(m.content)}</div>
          <div class="msg-time">${formatTime(m.created_at)}</div>
        </div>`;
      });
      // Keep typing indicator at bottom
      html += `<div class="typing-indicator" id="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    function subscribeToMessages() {
      if (realtimeChannel) _sb.removeChannel(realtimeChannel);
      realtimeChannel = _sb.channel(`msgs-${activeConvo.xekieId}-${currentUser.id}`)
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'messages',
          filter: `xekie_id=eq.${activeConvo.xekieId}`
        }, (payload) => {
          const m = payload.new;
          const relevant = (m.sender_id === currentUser.id && m.recipient_id === activeConvo.otherId) ||
                           (m.sender_id === activeConvo.otherId && m.recipient_id === currentUser.id);
          if (!relevant) return;

          const container = document.getElementById('chat-messages');
          const placeholder = container.querySelector('.loading-msgs');
          if (placeholder) placeholder.remove();

          // Remove typing indicator temporarily
          const typingEl = document.getElementById('typing-indicator');
          if (typingEl) typingEl.remove();

          const isMine = m.sender_id === currentUser.id;
          const div = document.createElement('div');
          div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
          div.innerHTML = `<div class="msg-bubble">${escapeHtml(m.content)}</div><div class="msg-time">${formatTime(m.created_at)}</div>`;
          container.appendChild(div);

          // Re-add typing indicator
          const newTyping = document.createElement('div');
          newTyping.className = 'typing-indicator';
          newTyping.id = 'typing-indicator';
          newTyping.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
          container.appendChild(newTyping);

          container.scrollTop = container.scrollHeight;
          if (m.recipient_id === currentUser.id) {
            _sb.from('messages').update({ is_read: true }).eq('id', m.id).then(() => {});
          }
        }).subscribe();
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const content = input.value.trim();
      if (!content || !activeConvo) return;
      const btn = document.getElementById('btn-send');
      btn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      const { error } = await _sb.from('messages').insert({
        xekie_id: activeConvo.xekieId,
        sender_id: currentUser.id,
        recipient_id: activeConvo.otherId,
        content
      });

      btn.disabled = false;
      if (error) { input.value = content; alert('Failed to send: ' + error.message); return; }

      // ── SELLER REPLY NOTIFICATION ──
      // If the current user owns the XEKIE (is the buyer), notify the seller
      try {
        // Use cached owner or look it up
        let xekieOwnerId = activeConvo.xekieOwnerId;
        if (!xekieOwnerId) {
          const { data: xekie } = await _sb.from('xekies').select('user_id,title').eq('id', activeConvo.xekieId).single();
          if (xekie) { xekieOwnerId = xekie.user_id; activeConvo.xekieOwnerId = xekie.user_id; }
        }
        if (xekieOwnerId === currentUser.id) {
          // Current user is the buyer — notify the seller (activeConvo.otherId)
          const { data: sellerSub } = await _sb.from('subscriptions')
            .select('email, name')
            .eq('user_id', activeConvo.otherId)
            .single()
            .catch(() => ({ data: null }));
          const sellerEmail = sellerSub?.email;
          if (sellerEmail) {
            fetch('/.netlify/functions/send-email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                type: 'seller_reply',
                to: sellerEmail,
                data: {
                  xekieTitle: activeConvo.xekieTitle,
                  xekieId: activeConvo.xekieId,
                  buyerId: currentUser.id,
                  message: content.slice(0, 200) + (content.length > 200 ? '…' : '')
                }
              })
            }).catch(() => {});
          }
        }
      } catch(e) {}

      input.focus();
    }

    // Live sidebar refresh when new message arrives for this user
    _sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'login.html'; return; }
      currentUser = session.user;
      loadConversations();
      _sb.channel('sidebar-updates')
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'messages',
          filter: `recipient_id=eq.${session.user.id}`
        }, () => loadConversations())
        .subscribe();
    });
  </script>
</body>
</html>

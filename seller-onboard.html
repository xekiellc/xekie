<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEKIE — Set Up Payouts</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff4d1c">
  <link rel="apple-touch-icon" href="/icon-180x180.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--black:#0a0a0a;--white:#fafaf8;--cream:#f4f2ec;--accent:#ff4d1c;--mid:#6b6b6b;--border:rgba(10,10,10,0.12);--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
    body{font-family:var(--font-body);background:var(--cream);color:var(--black);min-height:100vh;display:flex;flex-direction:column;}
    nav{padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
    .nav-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-0.03em;color:var(--black);text-decoration:none;display:flex;flex-direction:column;line-height:1;}
    .nav-logo .xe{color:var(--accent);}
    .nav-tagline{font-size:8px;font-weight:400;letter-spacing:0.15em;color:var(--mid);font-family:var(--font-body);text-transform:uppercase;}
    .container{max-width:560px;margin:0 auto;padding:60px 20px;flex:1;}
    .card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:40px;}
    .icon{font-size:48px;margin-bottom:20px;}
    .title{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:10px;}
    .sub{font-size:15px;color:var(--mid);line-height:1.6;margin-bottom:32px;}
    .steps{display:flex;flex-direction:column;gap:16px;margin-bottom:32px;}
    .step{display:flex;gap:16px;align-items:flex-start;padding:16px;background:var(--cream);border-radius:12px;}
    .step-num{width:28px;height:28px;border-radius:50%;background:var(--black);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
    .step-text{font-size:14px;line-height:1.5;color:var(--black);}
    .step-text strong{display:block;font-weight:600;margin-bottom:2px;}
    .btn-primary{width:100%;padding:15px;background:var(--black);color:var(--white);border:none;border-radius:12px;font-family:var(--font-body);font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s;}
    .btn-primary:hover{background:var(--accent);}
    .btn-primary:disabled{background:#ccc;cursor:not-allowed;}
    .btn-secondary{width:100%;padding:13px;background:transparent;color:var(--mid);border:1.5px solid var(--border);border-radius:12px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;transition:all 0.2s;text-decoration:none;display:block;text-align:center;}
    .btn-secondary:hover{border-color:var(--black);color:var(--black);}
    .success-box{background:#EAF3DE;border:1px solid #c0dd97;border-radius:12px;padding:20px;margin-bottom:24px;text-align:center;}
    .success-box .success-icon{font-size:32px;margin-bottom:8px;}
    .success-box .success-title{font-family:var(--font-display);font-size:18px;font-weight:700;color:#3B6D11;margin-bottom:4px;}
    .success-box .success-sub{font-size:14px;color:#3B6D11;}
    .msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:16px;display:none;}
    .msg.error{background:#FCEBEB;color:#A32D2D;display:block;}
    .loading{text-align:center;padding:60px;color:var(--mid);}
    footer{background:var(--black);color:var(--white);padding:40px;margin-top:auto;}
    .footer-inner{max-width:900px;margin:0 auto;}
    .footer-logo{font-family:var(--font-display);font-size:22px;font-weight:800;}
    .footer-logo .xe{color:var(--accent);}
    .footer-bottom{font-size:12px;color:#444;border-top:1px solid #1a1a1a;padding-top:20px;margin-top:20px;}
    @media(max-width:600px){nav{padding:0 20px;}.card{padding:28px 20px;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <span><span class="xe">XE</span>KIE</span>
      <span class="nav-tagline">Trade Different</span>
    </a>
  </nav>

  <div class="container">
    <div id="content"><div class="loading">Loading...</div></div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo"><span class="xe">XE</span>KIE</div>
      <div class="footer-bottom">© 2025 XEKIE LLC. All rights reserved.</div>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://jlcrarqiyejgjbdesxik.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA";
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    const params = new URLSearchParams(window.location.search);
    const isSuccess = params.get('success') === 'true';
    const returnTo = params.get('return') || 'dashboard.html';

    _sb.auth.getSession().then(async ({ data: { session } }) => {
      if (!session) { window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href); return; }
      currentUser = session.user;

      // Check onboarding status
      const { data: profile } = await _sb
        .from('user_profiles')
        .select('stripe_account_id, stripe_onboarded')
        .eq('user_id', currentUser.id)
        .single();

      if (isSuccess) {
        // Mark as onboarded
        await _sb.from('user_profiles').upsert({
          user_id: currentUser.id,
          stripe_onboarded: true,
        }, { onConflict: 'user_id' });
        showSuccess();
      } else if (profile?.stripe_onboarded) {
        showAlreadyOnboarded();
      } else {
        showOnboarding();
      }
    });

    function showSuccess() {
      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="success-box">
            <div class="success-icon">🎉</div>
            <div class="success-title">Payout account connected!</div>
            <div class="success-sub">You're all set to receive payments from XEKIE transactions.</div>
          </div>
          <p style="font-size:14px;color:var(--mid);text-align:center;margin-bottom:20px;">Stripe will deposit your earnings directly to your bank account after buyers confirm receipt.</p>
          <a href="${returnTo}" class="btn-secondary" style="display:block;">← Back to XEKIE</a>
        </div>`;
    }

    function showAlreadyOnboarded() {
      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="success-box">
            <div class="success-icon">✅</div>
            <div class="success-title">Payout account connected</div>
            <div class="success-sub">Your bank account is already connected and ready to receive payments.</div>
          </div>
          <button class="btn-primary" onclick="startOnboarding()" style="margin-bottom:10px;">Update payout account</button>
          <a href="${returnTo}" class="btn-secondary">← Go back</a>
        </div>`;
    }

    function showOnboarding() {
      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="icon">💸</div>
          <div class="title">Set up your payouts</div>
          <div class="sub">Connect your bank account to receive payments when buyers confirm they've received their items. Powered by Stripe — the same platform used by Amazon and Shopify.</div>
          <div class="steps">
            <div class="step">
              <div class="step-num">1</div>
              <div class="step-text"><strong>Connect securely via Stripe</strong>Takes about 2 minutes. You'll need your bank account details or debit card.</div>
            </div>
            <div class="step">
              <div class="step-num">2</div>
              <div class="step-text"><strong>Sell on XEKIE</strong>Respond to XEKIEs, make offers, and close deals.</div>
            </div>
            <div class="step">
              <div class="step-num">3</div>
              <div class="step-text"><strong>Get paid automatically</strong>Once the buyer confirms receipt, your earnings land in your bank account within 2 business days.</div>
            </div>
          </div>
          <div class="msg" id="msg"></div>
          <button class="btn-primary" id="btn-onboard" onclick="startOnboarding()">Connect bank account →</button>
          <a href="${returnTo}" class="btn-secondary">Skip for now</a>
        </div>`;
    }

    async function startOnboarding() {
      const btn = document.getElementById('btn-onboard');
      if (btn) { btn.disabled = true; btn.textContent = 'Connecting...'; }

      try {
        const res = await fetch('/.netlify/functions/seller-onboard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.id,
            returnUrl: `https://xekie.com/seller-onboard.html?success=true&return=${encodeURIComponent(returnTo)}`,
          }),
        });

        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          const msg = document.getElementById('msg');
          if (msg) { msg.textContent = 'Error: ' + (data.error || 'Unknown error'); msg.style.display = 'block'; }
          if (btn) { btn.disabled = false; btn.textContent = 'Connect bank account →'; }
        }
      } catch (err) {
        const msg = document.getElementById('msg');
        if (msg) { msg.textContent = 'Error: ' + err.message; msg.style.display = 'block'; }
        if (btn) { btn.disabled = false; btn.textContent = 'Connect bank account →'; }
      }
    }
  </script>
</body>
</html>

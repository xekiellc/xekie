<!DOCTYPE html>
<html>

<head>

<title>My XEKIE Dashboard</title>
<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* swipe card styling */

.swipe-card{

width:320px;
padding:25px;
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
margin:auto;
text-align:center;
position:relative;
touch-action:none;

}

.swipe-hint{

margin-top:10px;
font-size:12px;
color:#777;

}

</style>

</head>

<body>

<header class="navbar">
<div class="nav-inner">

<a href="index.html" class="nav-logo">XEKIE</a>

<div class="nav-links">
<a href="radar.html">Radar</a>
<a href="request.html">Post</a>
<a href="dashboard.html">My XEKIE</a>
<a href="prohibited-items.html">Prohibited</a>
</div>

</div>
</header>


<section class="container">

<h1>My XEKIE Dashboard</h1>

<h2>Swipe Offers</h2>


<div id="card" class="swipe-card">

<h3>Offer: iPhone 15 Pro</h3>

<p>Seller Price: $850</p>

<p>Seller Rating ⭐⭐⭐⭐</p>

<p>Location: Cleveland</p>

<div class="swipe-hint">
⬅ Swipe Left = Reject | Swipe Right = Accept ➡
</div>

</div>


</section>



<footer class="xekie-footer">

<div class="footer-inner">

<strong>XEKIE — Trade Different</strong>

</div>

</footer>



<script>

const card = document.getElementById("card");

let startX = 0;
let currentX = 0;

card.addEventListener("touchstart", function(e){

startX = e.touches[0].clientX;

});

card.addEventListener("touchmove", function(e){

currentX = e.touches[0].clientX;

let move = currentX - startX;

card.style.transform = "translateX(" + move + "px)";

});

card.addEventListener("touchend", function(){

let move = currentX - startX;

if(move > 120){

acceptOffer();

}

else if(move < -120){

rejectOffer();

}

card.style.transform = "translateX(0px)";

});


function acceptOffer(){

confetti({
particleCount:200,
spread:70
});

alert("🎉 Offer Accepted!");

}


function rejectOffer(){

alert("Offer Rejected");

}

</script>

</body>
</html>

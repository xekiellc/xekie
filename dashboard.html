<!DOCTYPE html>
<html>

<head>

<title>My XEKIE Dashboard</title>
<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="navbar">
<div class="nav-inner">

<a href="index.html" class="nav-logo">XEKIE</a>

<div class="nav-links">
<a href="radar.html">Radar</a>
<a href="request.html">Post</a>
<a href="dashboard.html">My XEKIE</a>
<a href="prohibited-items.html">Prohibited</a>
</div>

</div>
</header>


<section class="container">

<h1>My XEKIE Dashboard</h1>

<h2>Saved XEKIEs</h2>

<div id="saved-feed"></div>

</section>


<footer class="xekie-footer">

<div class="footer-inner">

<strong>XEKIE — Trade Different</strong>

</div>

</footer>



<script>

const saved = JSON.parse(localStorage.getItem("savedXekies")) || [];

const feed = document.getElementById("saved-feed");

saved.forEach(x => {

const card = document.createElement("div");
card.className = "xekie-card";

card.innerHTML = `
<strong>${x.title}</strong><br>
Budget: ${x.budget}<br>
📍 ${x.location}
`;

feed.appendChild(card);

});

</script>

</body>
</html>

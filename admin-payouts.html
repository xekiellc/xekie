<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEKIE Admin — Payouts</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --black:#0a0a0a;--white:#fafaf8;--cream:#f4f2ec;--accent:#ff4d1c;
      --green:#3B6D11;--green-bg:#EAF3DE;--green-border:#c0dd97;
      --mid:#6b6b6b;--border:rgba(10,10,10,0.12);
      --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
    }
    body{font-family:var(--font-body);background:var(--cream);color:var(--black);min-height:100vh;}
    nav{padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--black);}
    .nav-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-0.03em;color:var(--white);text-decoration:none;}
    .nav-logo .xe{color:var(--accent);}
    .nav-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.05em;}
    .container{max-width:900px;margin:0 auto;padding:48px 20px;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
    .page-title{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-0.03em;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px 24px;}
    .stat-label{font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--mid);text-transform:uppercase;margin-bottom:6px;}
    .stat-value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--black);}
    .stat-value.accent{color:var(--accent);}
    .stat-value.green{color:var(--green);}
    .section-title{font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .count-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
    .payout-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .payout-card.paid{opacity:0.6;}
    .payout-info{flex:1;}
    .payout-name{font-size:15px;font-weight:600;color:var(--black);margin-bottom:2px;}
    .payout-email{font-size:13px;color:var(--mid);margin-bottom:4px;}
    .payout-paypal{font-size:13px;color:#003087;font-weight:500;}
    .payout-meta{font-size:11px;color:#aaa;margin-top:4px;}
    .payout-amount{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--accent);white-space:nowrap;}
    .payout-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
    .btn-send{background:#003087;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;transition:background 0.2s;}
    .btn-send:hover{background:#001f5e;}
    .btn-paid{background:var(--green);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background 0.2s;}
    .btn-paid:hover{background:#2a5009;}
    .btn-paid:disabled{background:#ccc;cursor:not-allowed;}
    .status-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:0.05em;}
    .status-pending{background:#fff8f2;color:#b35c00;}
    .status-paid{background:var(--green-bg);color:var(--green);}
    .empty-state{text-align:center;padding:48px;color:var(--mid);}
    .empty-icon{font-size:40px;margin-bottom:12px;}
    .loading{text-align:center;padding:60px;color:var(--mid);}
    .tab-row{display:flex;gap:8px;margin-bottom:24px;}
    .tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--mid);transition:all 0.2s;}
    .tab.active{background:var(--black);color:var(--white);border-color:var(--black);}
    .divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
    @media(max-width:600px){
      nav{padding:0 20px;}
      .container{padding:32px 16px;}
      .stats-row{grid-template-columns:1fr;}
      .payout-card{flex-direction:column;align-items:flex-start;}
      .payout-actions{flex-direction:row;width:100%;}
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo"><span class="xe">XE</span>KIE</a>
    <span class="nav-badge">ADMIN</span>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="page-title">Payout Dashboard</div>
    </div>

    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value accent" id="stat-pending">—</div></div>
      <div class="stat-card"><div class="stat-label">Pending Amount</div><div class="stat-value accent" id="stat-pending-amt">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Paid Out</div><div class="stat-value green" id="stat-total">—</div></div>
    </div>

    <div class="tab-row">
      <button class="tab active" onclick="showTab('pending')">Pending</button>
      <button class="tab" onclick="showTab('paid')">Paid</button>
      <button class="tab" onclick="showTab('all')">All</button>
    </div>

    <div id="payout-list"><div class="loading">Loading payouts…</div></div>
  </div>

  <script>
    const SUPABASE_URL = "https://jlcrarqiyejgjbdesxik.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA";
    const RESEND_API_KEY = ""; // handled server-side
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ADMIN_USER_ID = ""; // set to your Supabase user ID
    let allPayouts = [];
    let currentTab = "pending";

    async function init() {
      const { data: { session } } = await _sb.auth.getSession();
      if (!session) { window.location.href = "login.html"; return; }
      loadPayouts();
    }

    async function loadPayouts() {
      const { data, error } = await _sb
        .from("cashout_history")
        .select("*, user_profiles(display_name, email:user_id)")
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("payout-list").innerHTML = '<div class="empty-state">Error loading payouts.</div>';
        return;
      }

      // Also get user emails from auth
      allPayouts = data || [];
      updateStats();
      renderList();
    }

    function updateStats() {
      const pending = allPayouts.filter(p => p.status === "pending");
      const paid = allPayouts.filter(p => p.status === "paid");
      document.getElementById("stat-pending").textContent = pending.length;
      document.getElementById("stat-pending-amt").textContent = "$" + (pending.reduce((s, p) => s + p.amount_cents, 0) / 100).toFixed(2);
      document.getElementById("stat-total").textContent = "$" + (paid.reduce((s, p) => s + p.amount_cents, 0) / 100).toFixed(2);
    }

    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      event.target.classList.add("active");
      renderList();
    }

    function renderList() {
      const filtered = allPayouts.filter(p => {
        if (currentTab === "pending") return p.status === "pending";
        if (currentTab === "paid") return p.status === "paid";
        return true;
      });

      const list = document.getElementById("payout-list");

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">${currentTab === "pending" ? "✅" : "💸"}</div><div>${currentTab === "pending" ? "No pending payouts" : "No paid payouts yet"}</div></div>`;
        return;
      }

      list.innerHTML = filtered.map(p => {
        const date = new Date(p.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
        const paypalLink = `https://www.paypal.com/myaccount/transfer/homepage/send?amount=${(p.amount_cents/100).toFixed(2)}&recipient=${encodeURIComponent(p.paypal_email || "")}&currencyCode=USD`;
        const isPending = p.status === "pending";

        return `
          <div class="payout-card ${isPending ? "" : "paid"}" id="card-${p.id}">
            <div class="payout-info">
              <div class="payout-name">${p.user_profiles?.display_name || "Seller"}</div>
              <div class="payout-paypal">PayPal: ${p.paypal_email || "—"}</div>
              <div class="payout-meta">${date} · ID: ${p.id?.slice(0, 8)}…</div>
              <span class="status-badge ${isPending ? "status-pending" : "status-paid"}">${isPending ? "PENDING" : "PAID"}</span>
            </div>
            <div class="payout-amount">$${(p.amount_cents / 100).toFixed(2)}</div>
            <div class="payout-actions">
              ${isPending ? `
                <a href="${paypalLink}" target="_blank" class="btn-send">Send via PayPal →</a>
                <button class="btn-paid" onclick="markPaid('${p.id}', '${p.paypal_email}', ${p.amount_cents})" id="btn-${p.id}">Mark as Paid ✓</button>
              ` : `
                <span class="status-badge status-paid">PAID ✓</span>
              `}
            </div>
          </div>
        `;
      }).join("");
    }

    async function markPaid(payoutId, paypalEmail, amountCents) {
      const btn = document.getElementById(`btn-${payoutId}`);
      btn.disabled = true;
      btn.textContent = "Updating…";

      const { error } = await _sb
        .from("cashout_history")
        .update({ status: "paid", paid_at: new Date().toISOString() })
        .eq("id", payoutId);

      if (error) {
        btn.disabled = false;
        btn.textContent = "Mark as Paid ✓";
        alert("Error updating status. Please try again.");
        return;
      }

      // Send confirmation email to seller via function
      try {
        await fetch("/.netlify/functions/confirm-payout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ payoutId, paypalEmail, amountCents }),
        });
      } catch (_) {}

      // Update local state
      const idx = allPayouts.findIndex(p => p.id === payoutId);
      if (idx > -1) allPayouts[idx].status = "paid";
      updateStats();
      renderList();
    }

    init();
  </script>
</body>
</html>

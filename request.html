<!DOCTYPE html>
<head>

<title>Post a XEKIE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

.fireworks{
font-size:40px;
text-align:center;
margin-top:20px;
}

.badge{
background:#ffd700;
color:black;
padding:4px 8px;
border-radius:12px;
font-size:12px;
margin-left:8px;
}

</style>

</head>

<body>

<header class="navbar">
<div class="nav-inner">

<a href="index.html" class="nav-logo">
XEKIE <span class="badge">EARLY ADOPTER</span>
</a>

<div class="nav-links">
<a href="radar.html">Radar</a>
<a href="request.html">Post</a>
<a href="dashboard.html">My XEKIE</a>
<a href="prohibited-items.html">Prohibited</a>
</div>

</div>
</header>


<section class="container">

<h1>Post a XEKIE</h1>

<form id="xekie-form">

<input id="title" type="text" placeholder="What are you looking for?" required>

<input id="budget" type="text" placeholder="Budget">

<input id="location" type="text" placeholder="Location">

<button type="submit">Broadcast XEKIE</button>

</form>

<div id="celebration" class="fireworks"></div>

</section>


<footer class="xekie-footer">

<div class="footer-inner">

<strong>XEKIE — Trade Different</strong>

</div>

</footer>


<audio id="toast">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-glass-toast-2159.mp3">
</audio>


<script>

const form = document.getElementById("xekie-form");

form.addEventListener("submit", function(e){

e.preventDefault();

/* confetti */

confetti({
particleCount:200,
spread:70
});

/* fireworks emoji */

document.getElementById("celebration").innerHTML = "🎆 🎆 🎆";

/* clinking glasses sound */

document.getElementById("toast").play();

alert("🚀 Your XEKIE has been broadcast!");

});

</script>

</body>
</html>

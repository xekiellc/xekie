<!DOCTYPE html>
<html>

<head>

<title>Post a XEKIE</title>
<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<header class="navbar">
<div class="nav-inner">

<a href="index.html" class="nav-logo">XEKIE</a>

<div class="nav-links">
<a href="radar.html">Radar</a>
<a href="request.html">Post a XEKIE</a>
<a href="prohibited-items.html">Prohibited</a>
<a href="terms.html">Terms</a>
<a href="privacy.html">Privacy</a>
<a href="guidelines.html">Guidelines</a>
</div>

</div>
</header>


<section class="container">

<h1>Post a XEKIE</h1>

<form id="xekie-form">

<input id="item" type="text" placeholder="What are you looking for?" required>

<input id="budget" type="text" placeholder="Budget">

<input id="location" type="text" placeholder="Location">

<button type="submit">Broadcast XEKIE</button>

</form>

</section>


<section id="share-section" style="display:none">

<h2>Share your XEKIE</h2>

<button onclick="shareTwitter()">Share on Twitter</button>
<button onclick="shareLinkedIn()">Share on LinkedIn</button>
<button onclick="copyLink()">Copy Link</button>

</section>


<footer class="xekie-footer">
<div class="footer-inner">

<strong>XEKIE — Trade Different</strong>

</div>
</footer>


<script>

const form = document.getElementById("xekie-form");

form.addEventListener("submit", function(e){

e.preventDefault();

/* confetti */

confetti({
particleCount:200,
spread:70
});

document.getElementById("share-section").style.display="block";

});


function shareTwitter(){

const item = document.getElementById("item").value;

const url =
"https://twitter.com/intent/tweet?text=🚨 XEKIE REQUEST: Looking for "
+ item +
" — respond on XEKIE.com";

window.open(url);

}


function shareLinkedIn(){

const item = document.getElementById("item").value;

const url =
"https://www.linkedin.com/sharing/share-offsite/?url=https://xekie.com";

window.open(url);

}


function copyLink(){

navigator.clipboard.writeText("https://xekie.com");

alert("Link copied!");

}

</script>

</body>
</html>

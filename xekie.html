<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO — populated dynamically below -->
  <title>XEKIE — Trade Different</title>
  <meta name="description" content="Buyers post what they want. Sellers respond with offers. The world's first demand-side marketplace." />
  <link id="canonical" rel="canonical" href="https://xekie.com/xekie.html" />

  <!-- Open Graph -->
  <meta property="og:type"        content="product" />
  <meta property="og:site_name"   content="XEKIE" />
  <meta property="og:url"         id="og-url"   content="https://xekie.com/xekie.html" />
  <meta property="og:title"       id="og-title" content="XEKIE — Trade Different" />
  <meta property="og:description" id="og-desc"  content="Buyers post what they want. Sellers respond with offers." />
  <meta property="og:image"       id="og-image" content="https://xekie.com/og-default.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@xekie" />
  <meta name="twitter:title"       id="tw-title" content="XEKIE — Trade Different" />
  <meta name="twitter:description" id="tw-desc"  content="Buyers post what they want. Sellers respond with offers." />
  <meta name="twitter:image"       id="tw-image" content="https://xekie.com/og-default.png" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DPXVZVMJXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DPXVZVMJXX');
  </script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --brand: #00c896;
      --brand-dark: #009e78;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #e05252;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--brand);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-links { display: flex; gap: 16px; align-items: center; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--brand); color: #000; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--brand); color: var(--brand); }

    /* ── LAYOUT ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── LOADING / ERROR ── */
    .state-box {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .state-box h2 { font-size: 1.3rem; margin-bottom: 10px; color: var(--text); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── XEKIE CARD ── */
    .xekie-header {
      margin-bottom: 28px;
    }
    .xekie-category {
      display: inline-block;
      background: var(--brand);
      color: #000;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .xekie-title {
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .xekie-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .xekie-meta span { display: flex; align-items: center; gap: 5px; }

    /* ── BUDGET PILL ── */
    .budget-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 8px 18px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brand);
      margin: 20px 0;
    }

    /* ── DESCRIPTION ── */
    .xekie-description {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 24px;
      white-space: pre-wrap;
    }

    /* ── PHOTOS ── */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }
    .photos-grid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .photos-grid img:hover { opacity: 0.85; }

    /* ── OFFER FORM ── */
    .offer-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 24px;
    }
    .offer-section h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--brand);
    }
    .price-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .price-row .form-group { flex: 1; margin-bottom: 0; }

    /* ── SHARE BAR ── */
    .share-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .share-bar span { font-size: 0.85rem; color: var(--muted); }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.2s;
    }
    .share-btn:hover { border-color: var(--brand); color: var(--brand); }
    .copy-url-input {
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* ── OFFERS LIST ── */
    .offers-section { margin-top: 32px; }
    .offers-section h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.8rem;
    }
    .offer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .offer-card .offer-price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--brand);
      margin-bottom: 6px;
    }
    .offer-card .offer-msg {
      color: var(--text);
      line-height: 1.6;
      font-size: 0.92rem;
    }
    .offer-card .offer-date {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 8px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--brand);
      color: #000;
      padding: 10px 22px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .xekie-title { font-size: 1.4rem; }
      nav { padding: 12px 16px; }
      .container { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">XEKIE</a>
  <div class="nav-links">
    <a href="/radar.html">Browse</a>
    <a href="/request.html" class="btn btn-primary">+ Post XEKIE</a>
  </div>
</nav>

<div class="container">
  <div id="loading" class="state-box">
    <div class="spinner"></div>
    <p>Loading XEKIE…</p>
  </div>
  <div id="error" class="state-box" style="display:none">
    <h2>XEKIE Not Found</h2>
    <p style="margin-bottom:24px">It may have expired or been removed.</p>
    <a href="/radar.html" class="btn btn-primary">Browse XEKIEs</a>
  </div>
  <div id="content" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://jlcrarqiyejgjbdesxik.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  const params = new URLSearchParams(location.search);
  const slugParam = params.get('slug');
  const idParam   = params.get('id');

  let xekie = null;

  async function loadXekie() {
    let query = sb.from('xekies').select('*');

    if (slugParam) {
      query = query.eq('slug', slugParam);
    } else if (idParam) {
      query = query.eq('id', idParam);
    } else {
      showError(); return;
    }

    const { data, error } = await query.single();
    if (error || !data) { showError(); return; }
    xekie = data;

    sb.from('xekies').update({ view_count: (data.view_count || 0) + 1 }).eq('id', data.id);

    renderXekie(data);
    loadOffers(data.id);
  }

  function canonicalURL(x) {
    if (x.slug) return `https://xekie.com/x/${x.slug}`;
    return `https://xekie.com/xekie.html?id=${x.id}`;
  }

  function renderXekie(x) {
    const url   = canonicalURL(x);
    const title = `${x.title} — XEKIE`;
    const desc  = x.description ? x.description.slice(0, 160) : 'Buyers post what they want. Sellers respond with offers.';
    const ogImg = `https://jlcrarqiyejgjbdesxik.supabase.co/functions/v1/og-image?id=${x.id}`;

    document.title = title;
    document.getElementById('canonical').href       = url;
    document.getElementById('og-url').content       = url;
    document.getElementById('og-title').content     = title;
    document.getElementById('og-desc').content      = desc;
    document.getElementById('og-image').content     = ogImg;
    document.getElementById('tw-title').content     = title;
    document.getElementById('tw-desc').content      = desc;
    document.getElementById('tw-image').content     = ogImg;
    document.querySelector('meta[name="description"]').content = desc;

    if (x.slug && !slugParam) {
      history.replaceState(null, '', `/x/${x.slug}`);
    }

    let photosHTML = '';
    const photos = Array.isArray(x.photos) ? x.photos : [];
    if (photos.length) {
      photosHTML = `<div class="photos-grid">${
        photos.map(p => `<img src="${p}" alt="${escHtml(x.title)}" loading="lazy" onclick="openPhoto('${p}')" />`).join('')
      }</div>`;
    }

    const budget = x.budget ? `<div class="budget-pill">💰 Budget: $${Number(x.budget).toLocaleString()}</div>` : '';

    let expiryHTML = '';
    if (x.expires_at) {
      const d   = new Date(x.expires_at);
      const now = new Date();
      const days = Math.ceil((d - now) / 86400000);
      expiryHTML = days > 0
        ? `<span>⏳ Expires in ${days} day${days !== 1 ? 's' : ''}</span>`
        : `<span style="color:var(--danger)">⛔ Expired</span>`;
    }

    const locationHTML = x.location ? `<span>📍 ${escHtml(x.location)}</span>` : '';
    const posted = new Date(x.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    document.getElementById('content').innerHTML = `
      <div class="xekie-header">
        ${x.category ? `<span class="xekie-category">${escHtml(x.category)}</span>` : ''}
        <h1 class="xekie-title">${escHtml(x.title)}</h1>
        <div class="xekie-meta">
          <span>📅 Posted ${posted}</span>
          <span>👁 ${(x.view_count || 0).toLocaleString()} views</span>
          ${locationHTML}
          ${expiryHTML}
        </div>
      </div>

      ${budget}
      ${photosHTML}

      <div class="xekie-description">${escHtml(x.description || '')}</div>

      <div class="share-bar">
        <span>Share:</span>
        <button class="share-btn" onclick="copyURL()">🔗 Copy Link</button>
        <button class="share-btn" onclick="shareTwitter()">𝕏 Twitter</button>
        <input class="copy-url-input" id="shareURL" value="${url}" readonly onclick="this.select()" />
      </div>

      <div class="offer-section">
        <h3>Make an Offer</h3>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="offerName" placeholder="e.g. Jordan Sellers" />
        </div>
        <div class="form-group">
          <label>Email (buyer will contact you)</label>
          <input type="email" id="offerEmail" placeholder="you@email.com" />
        </div>
        <div class="price-row">
          <div class="form-group">
            <label>Your Price ($)</label>
            <input type="number" id="offerPrice" placeholder="0.00" min="0" step="0.01" />
          </div>
        </div>
        <div class="form-group" style="margin-top:14px">
          <label>Message to Buyer</label>
          <textarea id="offerMessage" rows="4" placeholder="Tell the buyer what you're offering, condition, shipping, etc."></textarea>
        </div>
        <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;margin-top:4px" onclick="submitOffer()">
          Send Offer →
        </button>
      </div>

      <div class="offers-section">
        <h3>Offers Received</h3>
        <div id="offersList"><p style="color:var(--muted);font-size:0.9rem">Loading offers…</p></div>
      </div>
    `;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    gtag('event', 'xekie_view', { xekie_id: x.id, category: x.category });
  }

  async function loadOffers(xekieId) {
    const { data } = await sb.from('offers').select('*').eq('xekie_id', xekieId).order('created_at', { ascending: false });
    const el = document.getElementById('offersList');
    if (!data || !data.length) {
      el.innerHTML = '<p style="color:var(--muted);font-size:0.9rem">No offers yet — be the first!</p>';
      return;
    }
    el.innerHTML = data.map(o => `
      <div class="offer-card">
        ${o.price ? `<div class="offer-price">$${Number(o.price).toLocaleString()}</div>` : ''}
        <div class="offer-msg">${escHtml(o.message || '')}</div>
        <div class="offer-date">${new Date(o.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
      </div>
    `).join('');
  }

  async function submitOffer() {
    const name    = document.getElementById('offerName').value.trim();
    const email   = document.getElementById('offerEmail').value.trim();
    const price   = document.getElementById('offerPrice').value.trim();
    const message = document.getElementById('offerMessage').value.trim();

    if (!name || !email || !message) { showToast('Please fill in name, email, and message.'); return; }

    const { data: session } = await sb.auth.getSession();
    const seller_id = session?.session?.user?.id || null;

    const { error } = await sb.from('offers').insert({
      xekie_id:  xekie.id,
      seller_id,
      seller_name: name,
      seller_email: email,
      price: price ? parseFloat(price) : null,
      message
    });

    if (error) { showToast('Error sending offer. Try again.'); return; }

    showToast('✅ Offer sent!');
    gtag('event', 'offer_submitted', { xekie_id: xekie.id, category: xekie.category });
    document.getElementById('offerName').value    = '';
    document.getElementById('offerEmail').value   = '';
    document.getElementById('offerPrice').value   = '';
    document.getElementById('offerMessage').value = '';
    loadOffers(xekie.id);
  }

  function copyURL() {
    const url = canonicalURL(xekie);
    navigator.clipboard.writeText(url).then(() => showToast('🔗 Link copied!'));
    gtag('event', 'share_copy', { xekie_id: xekie?.id });
  }

  function shareTwitter() {
    const url  = canonicalURL(xekie);
    const text = encodeURIComponent(`I'm looking for: ${xekie.title} — make me an offer on XEKIE! 👀`);
    window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}`, '_blank');
    gtag('event', 'share_twitter', { xekie_id: xekie?.id });
  }

  function openPhoto(src) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
    overlay.innerHTML = `<img src="${src}" style="max-width:92vw;max-height:92vh;border-radius:10px" />`;
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'block';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadXekie();
</script>
</body>
</html>

# netlify.toml — XEKIE
# Auto-deploy from GitHub main branch

[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# ─── /x/:slug → serverless OG function (handles social scrapers) ─────────────
[[redirects]]
  from = "/x/:slug"
  to   = "/.netlify/functions/xekie-og-page/:slug"
  status = 200
  force = true

# ─── Custom 404 ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

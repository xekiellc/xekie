# netlify.toml — XEKIE
# Auto-deploy from GitHub main branch

[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# ─── Edge Function: dynamic OG tags for social sharing ──────────────────────
[[edge_functions]]
  path = "/x/*"
  function = "xekie-og"

[[edge_functions]]
  path = "/xekie.html"
  function = "xekie-og"

# ─── Clean URL: /x/:slug → xekie.html ───────────────────────────────────────
[[redirects]]
  from = "/x/:slug"
  to   = "/xekie.html"
  status = 200

# ─── Custom 404 ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

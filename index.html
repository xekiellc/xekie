<script>

/* ---------------- DEMAND PULSE ---------------- */

const pulse = [

"🔥 Someone just XEKIE'd an iPhone 15 Pro — Akron",
"🔥 Bedroom painting requested — Cleveland",
"🔥 Looking for Toyota Tacoma — Columbus",
"🔥 Vintage Apple poster requested — Cincinnati"

];

function loadPulse(){

const feed = document.getElementById("pulse-feed");

pulse.forEach(p => {

const item = document.createElement("div");
item.className = "pulse-item";

item.innerHTML = p;

feed.appendChild(item);

});

}

loadPulse();



/* ---------------- RECENT XEKIES ---------------- */

const xekies = [

{
title:"iPhone 15 Pro",

},

{

location:"Cleveland"
},

{
title:"Bedroom Painting",

location:"Cuyahoga Falls"
},

{

budget:"$300",
location:"Columbus"
}

];


function loadXekies(){

const feed = document.getElementById("xekie-feed");

xekies.forEach(x => {

const card = document.createElement("div");
card.className = "xekie-card";

card.innerHTML = `
<strong>${x.title}</strong><br>
Budget: ${x.budget}<br>
📍 ${x.location}
`;

feed.appendChild(card);

});

}

loadXekies();

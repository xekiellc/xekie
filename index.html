function loadXekies(){

Budget: ${x.budget}<br>
📍 ${x.location}<br><br>

<button onclick="saveXekie(${index})">⭐ Save XEKIE</button>
`;

feed.appendChild(card);

});

}



function saveXekie(index){

savedXekies.push(xekies[index]);

localStorage.setItem("savedXekies", JSON.stringify(savedXekies));

alert("⭐ XEKIE saved!");

}

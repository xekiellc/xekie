<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEKIE — Cash Out</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff4d1c">
  <link rel="apple-touch-icon" href="/icon-180x180.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--black:#0a0a0a;--white:#fafaf8;--cream:#f4f2ec;--accent:#ff4d1c;--mid:#6b6b6b;--border:rgba(10,10,10,0.12);--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
    body{font-family:var(--font-body);background:var(--cream);color:var(--black);min-height:100vh;display:flex;flex-direction:column;}
    nav{padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
    .nav-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-0.03em;color:var(--black);text-decoration:none;display:flex;flex-direction:column;line-height:1;}
    .nav-logo .xe{color:var(--accent);}
    .nav-tagline{font-size:8px;font-weight:400;letter-spacing:0.15em;color:var(--mid);font-family:var(--font-body);text-transform:uppercase;}
    .container{max-width:560px;margin:0 auto;padding:48px 20px;flex:1;}
    .page-title{font-family:var(--font-display);font-size:32px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;}
    .page-sub{font-size:15px;color:var(--mid);margin-bottom:32px;}
    .balance-card{background:var(--black);border-radius:20px;padding:36px;text-align:center;margin-bottom:24px;}
    .balance-label{font-size:12px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#666;margin-bottom:12px;}
    .balance-amount{font-family:var(--font-display);font-size:56px;font-weight:800;color:var(--accent);letter-spacing:-0.03em;line-height:1;}
    .balance-sub{font-size:14px;color:#555;margin-top:8px;}
    .card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:16px;}
    .card-title{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:6px;}
    .card-sub{font-size:14px;color:var(--mid);margin-bottom:20px;line-height:1.5;}
    .btn-primary{width:100%;padding:15px;background:var(--black);color:var(--white);border:none;border-radius:12px;font-family:var(--font-body);font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-bottom:10px;}
    .btn-primary:hover{background:var(--accent);}
    .btn-primary:disabled{background:#ccc;cursor:not-allowed;}
    .btn-secondary{width:100%;padding:13px;background:transparent;color:var(--mid);border:1.5px solid var(--border);border-radius:12px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;text-align:center;}
    .btn-secondary:hover{border-color:var(--black);color:var(--black);}
    .history-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
    .history-item:last-child{border-bottom:none;}
    .history-label{font-size:14px;color:var(--black);}
    .history-sub{font-size:12px;color:var(--mid);margin-top:2px;}
    .history-amount{font-family:var(--font-display);font-size:16px;font-weight:700;color:#3B6D11;}
    .msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:16px;display:none;}
    .msg.error{background:#FCEBEB;color:#A32D2D;display:block;}
    .msg.success{background:#EAF3DE;color:#3B6D11;display:block;}
    .success-box{background:#EAF3DE;border:1px solid #c0dd97;border-radius:16px;padding:24px;text-align:center;margin-bottom:24px;}
    .success-icon{font-size:40px;margin-bottom:12px;}
    .success-title{font-family:var(--font-display);font-size:20px;font-weight:700;color:#3B6D11;margin-bottom:6px;}
    .success-sub{font-size:14px;color:#3B6D11;}
    .zero-state{text-align:center;padding:48px 20px;}
    .zero-icon{font-size:48px;margin-bottom:16px;}
    .zero-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:8px;}
    .zero-sub{font-size:15px;color:var(--mid);margin-bottom:24px;line-height:1.6;}
    .loading{text-align:center;padding:60px;color:var(--mid);}
    .how-it-works{background:var(--cream);border-radius:12px;padding:16px 20px;margin-bottom:20px;}
    .how-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;}
    .how-step:last-child{margin-bottom:0;}
    .how-num{width:24px;height:24px;border-radius:50%;background:var(--black);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px;}
    .how-text{font-size:13px;color:var(--mid);line-height:1.5;}
    footer{background:var(--black);color:var(--white);padding:40px;margin-top:auto;}
    .footer-inner{max-width:900px;margin:0 auto;}
    .footer-logo{font-family:var(--font-display);font-size:22px;font-weight:800;}
    .footer-logo .xe{color:var(--accent);}
    .footer-bottom{font-size:12px;color:#444;border-top:1px solid #1a1a1a;padding-top:20px;margin-top:20px;}
    @media(max-width:600px){nav{padding:0 20px;}.container{padding:32px 16px;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <span><span class="xe">XE</span>KIE</span>
      <span class="nav-tagline">Trade Different</span>
    </a>
  </nav>

  <div class="container">
    <div id="content"><div class="loading">Loading your balance...</div></div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo"><span class="xe">XE</span>KIE</div>
      <div class="footer-bottom">© 2025 XEKIE LLC. All rights reserved.</div>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://jlcrarqiyejgjbdesxik.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA";
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentBalance = 0;
    const params = new URLSearchParams(window.location.search);

    _sb.auth.getSession().then(async ({ data: { session } }) => {
      if (!session) { window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href); return; }
      currentUser = session.user;

      // Handle return from Stripe onboarding
      if (params.get('onboarded') === 'true') {
        await _sb.from('user_profiles').upsert({
          user_id: currentUser.id,
          stripe_onboarded: true,
        }, { onConflict: 'user_id' });
        window.history.replaceState({}, '', 'cashout.html');
      }

      loadBalance();
    });

    async function loadBalance() {
      const { data: profile } = await _sb
        .from('user_profiles')
        .select('balance_cents, stripe_onboarded, stripe_account_id')
        .eq('user_id', currentUser.id)
        .single();

      currentBalance = profile?.balance_cents || 0;

      // Get transaction history
      const { data: transactions } = await _sb
        .from('transactions')
        .select('*')
        .eq('seller_id', currentUser.id)
        .eq('status', 'released')
        .order('released_at', { ascending: false })
        .limit(10);

      renderPage(currentBalance, transactions || [], profile);
    }

    function renderPage(balanceCents, transactions, profile) {
      const balanceAmt = (balanceCents / 100).toFixed(2);
      const hasBalance = balanceCents > 0;

      document.getElementById('content').innerHTML = `
        <h1 class="page-title">Cash Out</h1>
        <p class="page-sub">Your XEKIE seller earnings — cash out anytime.</p>

        <div class="balance-card">
          <div class="balance-label">Available Balance</div>
          <div class="balance-amount">$${balanceAmt}</div>
          <div class="balance-sub">${hasBalance ? 'Ready to transfer to your bank' : 'Complete sales to build your balance'}</div>
        </div>

        ${hasBalance ? `
        <div class="card">
          <div class="card-title">Request payout</div>
          <div class="card-sub">Transfer your balance to your bank account. ${!profile?.stripe_onboarded ? 'You\'ll connect your bank account via Stripe — takes 2 minutes.' : 'Funds arrive within 2 business days.'}</div>
          <div class="how-it-works">
            <div class="how-step">
              <div class="how-num">1</div>
              <div class="how-text">${!profile?.stripe_onboarded ? 'Connect your bank account via Stripe (one time setup)' : 'Your bank account is connected ✓'}</div>
            </div>
            <div class="how-step">
              <div class="how-num">2</div>
              <div class="how-text">XEKIE transfers $${balanceAmt} to your account</div>
            </div>
            <div class="how-step">
              <div class="how-num">3</div>
              <div class="how-text">Funds arrive within 2 business days</div>
            </div>
          </div>
          <div class="msg" id="cashout-msg"></div>
          <button class="btn-primary" id="btn-cashout" onclick="requestPayout()">
            ${!profile?.stripe_onboarded ? 'Connect bank & cash out $' + balanceAmt + ' →' : 'Cash out $' + balanceAmt + ' →'}
          </button>
          <a href="dashboard.html" class="btn-secondary">Back to dashboard</a>
        </div>
        ` : `
        <div class="zero-state">
          <div class="zero-icon">💸</div>
          <div class="zero-title">No balance yet</div>
          <div class="zero-sub">When buyers confirm receipt of items you've sold, your earnings appear here. Go find some XEKIEs to respond to!</div>
          <a href="radar.html" class="btn-primary" style="display:block;text-decoration:none;text-align:center;padding:15px;">Browse XEKIEs →</a>
        </div>
        `}

        ${transactions.length > 0 ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:16px;">Earnings history</div>
          ${transactions.map(t => `
            <div class="history-item">
              <div>
                <div class="history-label">Sale completed</div>
                <div class="history-sub">${new Date(t.released_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
              </div>
              <div class="history-amount">+$${(t.payout_amount_cents / 100).toFixed(2)}</div>
            </div>
          `).join('')}
        </div>
        ` : ''}
      `;
    }

    async function requestPayout() {
      const btn = document.getElementById('btn-cashout');
      const msg = document.getElementById('cashout-msg');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const res = await fetch('/.netlify/functions/request-payout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentUser.id }),
        });

        const data = await res.json();

        if (data.needsOnboarding) {
          // Redirect to Stripe onboarding
          window.location.href = data.url;
          return;
        }

        if (data.success) {
          msg.className = 'msg success';
          msg.textContent = `✓ $${data.cashedOut} is on its way to your bank! Arrives within 2 business days.`;
          btn.textContent = 'Cashed out ✓';
          // Reload to show updated balance
          setTimeout(() => loadBalance(), 2000);
        } else {
          msg.className = 'msg error';
          msg.textContent = 'Error: ' + (data.error || 'Unknown error');
          btn.disabled = false;
          btn.textContent = 'Try again';
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Error: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Try again';
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEKIE — Cash Out</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff4d1c">
  <link rel="apple-touch-icon" href="/icon-180x180.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --black:#0a0a0a;--white:#fafaf8;--cream:#f4f2ec;--accent:#ff4d1c;
      --green:#3B6D11;--green-bg:#EAF3DE;--green-border:#c0dd97;
      --mid:#6b6b6b;--border:rgba(10,10,10,0.12);
      --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
    }
    body{font-family:var(--font-body);background:var(--cream);color:var(--black);min-height:100vh;display:flex;flex-direction:column;}
    nav{padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
    .nav-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-0.03em;color:var(--black);text-decoration:none;display:flex;flex-direction:column;line-height:1;}
    .nav-logo .xe{color:var(--accent);}
    .nav-tagline{font-size:8px;font-weight:400;letter-spacing:0.15em;color:var(--mid);font-family:var(--font-body);text-transform:uppercase;}
    .nav-right{display:flex;gap:20px;align-items:center;}
    .nav-link{font-size:13px;color:var(--mid);text-decoration:none;font-weight:500;}
    .nav-link:hover{color:var(--black);}
    .container{max-width:560px;margin:0 auto;padding:48px 20px;flex:1;}
    .page-title{font-family:var(--font-display);font-size:32px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;}
    .page-sub{font-size:15px;color:var(--mid);margin-bottom:32px;}
    .balance-card{background:var(--black);border-radius:20px;padding:36px;text-align:center;margin-bottom:24px;}
    .balance-label{font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#555;margin-bottom:12px;}
    .balance-amount{font-family:var(--font-display);font-size:56px;font-weight:800;color:var(--accent);letter-spacing:-0.03em;line-height:1;}
    .balance-sub{font-size:13px;color:#555;margin-top:8px;}
    .card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:16px;}
    .card-title{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:6px;}
    .card-sub{font-size:14px;color:var(--mid);margin-bottom:24px;line-height:1.6;}
    .field-group{margin-bottom:20px;}
    .field-label{display:block;font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--mid);text-transform:uppercase;margin-bottom:8px;}
    .amount-wrap{position:relative;}
    .amount-prefix{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:500;color:var(--mid);pointer-events:none;}
    input[type="number"],input[type="email"]{width:100%;padding:14px 16px;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;color:var(--black);font-family:var(--font-body);font-size:16px;font-weight:500;outline:none;transition:border 0.2s;}
    input[type="number"]{padding-left:30px;font-size:18px;-moz-appearance:textfield;}
    input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;}
    input[type="number"]:focus,input[type="email"]:focus{border-color:var(--black);}
    .paypal-badge{display:inline-flex;align-items:center;gap:8px;background:#003087;color:#fff;font-size:11px;font-weight:700;letter-spacing:0.05em;padding:5px 14px;border-radius:20px;margin-bottom:20px;}
    .btn-primary{width:100%;padding:15px;background:var(--black);color:var(--white);border:none;border-radius:12px;font-family:var(--font-body);font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s,transform 0.1s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:10px;}
    .btn-primary:hover:not(:disabled){background:var(--accent);}
    .btn-primary:active:not(:disabled){transform:scale(0.99);}
    .btn-primary:disabled{background:#bbb;cursor:not-allowed;}
    .btn-secondary{width:100%;padding:13px;background:transparent;color:var(--mid);border:1.5px solid var(--border);border-radius:12px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;text-align:center;}
    .btn-secondary:hover{border-color:var(--black);color:var(--black);}
    .msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:16px;display:none;line-height:1.5;}
    .msg.error{background:#FCEBEB;color:#A32D2D;display:block;}
    .msg.success{background:var(--green-bg);color:var(--green);display:block;}
    .msg.info{background:#fff8f2;border:1px solid #ffd0b0;color:#b35c00;display:block;}
    .security-note{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;background:#f5f5f2;border-radius:10px;margin-top:14px;}
    .security-note p{font-size:11px;color:var(--mid);line-height:1.6;}
    .history-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
    .history-item:last-child{border-bottom:none;}
    .history-label{font-size:14px;color:var(--black);font-weight:500;}
    .history-meta{font-size:12px;color:var(--mid);margin-top:2px;}
    .history-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;margin-top:4px;}
    .badge-delivered{background:var(--green-bg);color:var(--green);}
    .badge-processing{background:#fff8f2;color:#b35c00;}
    .history-amount{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--green);}
    .zero-state{text-align:center;padding:48px 20px;}
    .zero-icon{font-size:48px;margin-bottom:16px;}
    .zero-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:8px;}
    .zero-sub{font-size:15px;color:var(--mid);margin-bottom:24px;line-height:1.6;}
    .loading{text-align:center;padding:60px;color:var(--mid);}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}
    footer{background:var(--black);color:var(--white);padding:40px;margin-top:auto;}
    .footer-inner{max-width:900px;margin:0 auto;}
    .footer-logo{font-family:var(--font-display);font-size:22px;font-weight:800;}
    .footer-logo .xe{color:var(--accent);}
    .footer-bottom{font-size:12px;color:#444;border-top:1px solid #1a1a1a;padding-top:20px;margin-top:20px;}
    @media(max-width:600px){nav{padding:0 20px;}.container{padding:32px 16px;}.balance-amount{font-size:44px;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <span><span class="xe">XE</span>KIE</span>
      <span class="nav-tagline">Trade Different</span>
    </a>
    <div class="nav-right">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="logout.html" class="nav-link">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div id="content"><div class="loading">Loading your balance…</div></div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo"><span class="xe">XE</span>KIE</div>
      <div class="footer-bottom">© 2025 XEKIE LLC. All rights reserved.</div>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://jlcrarqiyejgjbdesxik.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY3JhcnFpeWVqZ2piZGVzeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDU1NTQsImV4cCI6MjA4ODU4MTU1NH0.c4wUvoU_j8CXtLN7Lm-iCzPD-4aQRL2r1-FhfUCK2wA";

    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentBalance = 0;
    let sessionToken = null;

    _sb.auth.getSession().then(async ({ data: { session } }) => {
      if (!session) {
        window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);
        return;
      }
      currentUser = session.user;
      sessionToken = session.access_token;
      loadBalance();
    });

    async function loadBalance() {
      const { data: profile } = await _sb
        .from("user_profiles")
        .select("balance_cents")
        .eq("user_id", currentUser.id)
        .single();

      currentBalance = profile?.balance_cents || 0;

      const { data: history } = await _sb
        .from("cashout_history")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false })
        .limit(8);

      const { data: earnings } = await _sb
        .from("transactions")
        .select("*")
        .eq("seller_id", currentUser.id)
        .eq("status", "released")
        .order("released_at", { ascending: false })
        .limit(5);

      renderPage(currentBalance, history || [], earnings || []);
    }

    function renderPage(balanceCents, history, earnings) {
      const balanceAmt = (balanceCents / 100).toFixed(2);
      const hasBalance = balanceCents >= 100;

      document.getElementById("content").innerHTML = `
        <h1 class="page-title">Cash Out</h1>
        <p class="page-sub">Your XEKIE earnings — sent directly to your PayPal.</p>

        <div class="balance-card">
          <div class="balance-label">Available Balance</div>
          <div class="balance-amount" id="live-balance">$${balanceAmt}</div>
          <div class="balance-sub" id="live-balance-sub">${hasBalance ? "Ready to send to your PayPal" : "Complete sales to build your balance"}</div>
        </div>

        ${hasBalance ? `
        <div class="card">
          <div class="card-title">PayPal payout</div>
          <div class="card-sub">Enter your PayPal email address below. Funds arrive within minutes — no account setup required on your end.</div>

          <div class="paypal-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.58 2.975-2.477 4.359-5.498 4.359H12.72c-.524 0-.968.382-1.05.9L10.3 19.35l-.378 2.397h3.533c.524 0 .968-.382 1.05-.9l.792-5.02c.082-.518.526-.9 1.05-.9h.633c4.252 0 6.498-1.953 7.126-6.163.28-1.854.048-3.22-.884-4.047z"/></svg>
            Powered by PayPal
          </div>

          <div class="field-group">
            <label class="field-label">Amount to withdraw</label>
            <div class="amount-wrap">
              <span class="amount-prefix">$</span>
              <input type="number" id="payout-amount" placeholder="${balanceAmt}" min="1.00" max="${balanceAmt}" step="0.01" value="${balanceAmt}" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Your PayPal email address</label>
            <input type="email" id="paypal-email" placeholder="you@example.com" />
          </div>

          <div class="msg" id="cashout-msg"></div>

          <button class="btn-primary" id="btn-cashout" onclick="requestPayout()">
            Cash out $${balanceAmt} via PayPal
          </button>
          <a href="dashboard.html" class="btn-secondary">Back to dashboard</a>

          <div class="security-note">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;margin-top:2px"><path d="M7 1L2 3v4c0 2.76 2.12 5.34 5 5.95C9.88 12.34 12 9.76 12 7V3L7 1z" fill="#bbb"/></svg>
            <p>Payouts are processed securely via PayPal. Your earnings go directly to your PayPal account — XEKIE never stores your PayPal credentials.</p>
          </div>
        </div>
        ` : `
        <div class="zero-state">
          <div class="zero-icon">💸</div>
          <div class="zero-title">No balance yet</div>
          <div class="zero-sub">When buyers confirm receipt of your items, your earnings appear here — ready to cash out instantly to your PayPal account.</div>
          <a href="radar.html" class="btn-primary" style="display:block;text-decoration:none;text-align:center;padding:15px;">Find XEKIEs to respond to →</a>
        </div>
        `}

        ${history.length > 0 ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:16px;">Payout history</div>
          ${history.map(h => `
            <div class="history-item">
              <div>
                <div class="history-label">PayPal payout</div>
                <div class="history-meta">${new Date(h.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                <span class="history-badge ${h.status === "SUCCESS" || h.status === "paid" ? "badge-delivered" : "badge-processing"}">${h.status === "SUCCESS" || h.status === "paid" ? "Delivered" : "Processing"}</span>
              </div>
              <div class="history-amount">$${(h.amount_cents / 100).toFixed(2)}</div>
            </div>
          `).join("")}
        </div>
        ` : earnings.length > 0 ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:16px;">Earnings history</div>
          ${earnings.map(t => `
            <div class="history-item">
              <div>
                <div class="history-label">Sale completed</div>
                <div class="history-meta">${new Date(t.released_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
              </div>
              <div class="history-amount">+$${(t.payout_amount_cents / 100).toFixed(2)}</div>
            </div>
          `).join("")}
        </div>
        ` : ""}
      `;
    }

    function showMsg(text, type) {
      const el = document.getElementById("cashout-msg");
      if (!el) return;
      el.textContent = text;
      el.className = "msg " + type;
    }

    async function requestPayout() {
      const amountVal = parseFloat(document.getElementById("payout-amount").value);
      const amountCents = Math.round(amountVal * 100);
      const paypalEmail = document.getElementById("paypal-email").value.trim();
      const btn = document.getElementById("btn-cashout");

      if (!amountVal || isNaN(amountCents) || amountCents < 100) {
        showMsg("Minimum payout is $1.00.", "error"); return;
      }
      if (amountCents > currentBalance) {
        showMsg("Amount exceeds your available balance of $" + (currentBalance / 100).toFixed(2) + ".", "error"); return;
      }
      if (!paypalEmail || !paypalEmail.includes("@")) {
        showMsg("Please enter a valid PayPal email address.", "error"); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Processing…';
      showMsg("Sending your payout via PayPal…", "info");

      try {
        const res = await fetch("/.netlify/functions/request-payout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + sessionToken,
          },
          body: JSON.stringify({ paypalEmail, amountCents }),
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMsg(data.error || "Payout failed. Please try again.", "error");
          btn.disabled = false;
          btn.textContent = "Try again";
          return;
        }

        currentBalance = data.newBalanceCents;
        const balEl = document.getElementById("live-balance");
        const subEl = document.getElementById("live-balance-sub");
        if (balEl) balEl.textContent = "$" + (currentBalance / 100).toFixed(2);
        if (subEl) subEl.textContent = currentBalance >= 100 ? "Ready to send to your PayPal" : "Balance cleared";

        showMsg("✓ $" + (amountVal).toFixed(2) + " sent to " + paypalEmail + " — check your PayPal shortly.", "success");
        btn.textContent = "Cashed out ✓";

        setTimeout(() => loadBalance(), 3500);

      } catch (err) {
        showMsg("Network error. Please check your connection and try again.", "error");
        btn.disabled = false;
        btn.textContent = "Try again";
      }
    }
  </script>
</body>
</html>
